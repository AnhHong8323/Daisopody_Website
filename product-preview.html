<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Xem trước sản phẩm theo họ — Daisopody</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body { padding: var(--space-8) var(--space-8) var(--space-32); }
  .preview-header { max-width: var(--container-max); margin: 0 auto var(--space-16); }
  .preview-header h1 { margin: 0 0 var(--space-3); }
  .preview-header p { max-width: 640px; }

  .family { max-width: var(--container-max); margin: 0 auto var(--space-16); }
  .family-head {
    display: flex; align-items: baseline; gap: var(--space-3);
    border-bottom: 1px solid var(--border-hairline);
    padding-bottom: var(--space-3); margin-bottom: var(--space-6);
  }
  .family-head h2 { margin: 0; }
  .family-head .count { color: var(--fg-subtle); font-size: var(--fs-body-sm); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: var(--space-5);
  }
  .card {
    border: 1px solid var(--border-card);
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--bg-elevated);
    transition: border-color var(--dur-base) var(--ease-out);
  }
  .card:hover { border-color: var(--border-strong); }
  .card .photo {
    aspect-ratio: 1 / 1;
    background-size: cover;
    background-position: center;
    background-color: var(--moss-900-60);
  }
  .card .photo.empty {
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px dashed var(--border-card);
    color: var(--fg-disabled); font-size: var(--fs-caption);
  }
  .card .body { padding: var(--space-3) var(--space-4) var(--space-4); }
  .card .name { display: block; font-size: var(--fs-body-sm); font-weight: 500; color: var(--fg); }
  .card .sci { display: block; font-size: 11px; font-style: italic; color: var(--fg-subtle); margin-top: 2px; }
  .card .price {
    display: inline-block; margin-top: var(--space-2);
    font-size: var(--fs-caption); letter-spacing: var(--tracking-tag);
    color: var(--cream); border: 1px solid var(--border-card);
    border-radius: var(--radius-xs); padding: 2px 8px;
  }
</style>
</head>
<body>

  <div class="preview-header">
    <span class="eyebrow">NỘI BỘ · KHÔNG PHẢI TRANG SHOP CHÍNH THỨC</span>
    <h1 class="h1">Xem trước sản phẩm theo họ</h1>
    <p class="p-lead">Tên và giá lấy theo danh sách bạn đã cung cấp, gom theo từng họ/thư mục.</p>
  </div>

  <div id="families"></div>

      ]

  ];

  function formatPrice(v) {
    return v.toLocaleString("vi-VN") + "đ";
  }

  const root = document.getElementById("families");
  root.innerHTML = FAMILIES.map(fam => `
    <section class="family">
      <div class="family-head">
        <h2 class="h2">${fam.label}</h2>
        <span class="count">${fam.items.length} sản phẩm</span>
      </div>
      <div class="grid">
        ${fam.items.map(p => {
          const src = p.file ? encodeURI(fam.folder + p.file) : null;
          return `
          <div class="card">
            ${src ? `<div class="photo" style="background-image:url('${src}')"></div>` : `<div class="photo empty">Chưa có ảnh</div>`}
            <div class="body">
              <span class="name">${p.name}</span>
              <span class="sci">${p.sci}</span>
              <span class="price">${formatPrice(p.price)}</span>
            </div>
          </div>`;
        }).join("")}
      </div>
    </section>
  `).join("");
</script>

</body>
</html>
